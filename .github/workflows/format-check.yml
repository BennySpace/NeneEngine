name: Format Check

on:
  push:
    paths:
      - "**/*.h"
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cxx"
      - "**/*.cc"
      - ".clang-format"
      - ".github/workflows/format-check.yml"
  pull_request:
    paths:
      - "**/*.h"
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cxx"
      - "**/*.cc"
      - ".clang-format"
      - ".github/workflows/format-check.yml"
  workflow_dispatch:

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting of changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE_REF="origin/${{ github.base_ref }}"
            BASE_SHA="$(git merge-base HEAD "$BASE_REF")"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="${{ github.event.before }}"
          else
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD -- '*.h' '*.hpp' '*.cpp' '*.cxx' '*.cc' | grep -Ev '^(external|out)/' || true)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No changed C/C++ source files to format-check."
            exit 0
          fi

          printf 'Checking formatting for:\n'
          printf ' - %s\n' "${files[@]}"

          clang-format --dry-run --Werror --style=file "${files[@]}"
